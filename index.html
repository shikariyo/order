<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:sans-serif; padding:15px; }
.hidden { display:none; }

/* 卓 */
.top { display:flex; align-items:center; gap:12px; }

#table {
  min-width:160px;
  padding:8px;
  font-size:16px;
}

/* グリッド */
.grid {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* カード */
.card {
  border:2px solid #ccc;
  padding:10px;
  width:30%;
  min-width:90px;
  text-align:center;
  border-radius:10px;
  transition:0.2s;
}

.card:hover { transform:scale(1.05); }

input { display:none; }

input:checked + .card {
  border-color:#4cafef;
  background:#e3f2fd;
}

/* 色 */
.red { background:#ffe5e5; border-color:#ff8a8a; }
.green { background:#e5ffe5; border-color:#7edc7e; }
.white { background:#f5f5f5; }
.blue { background:#e5f0ff; border-color:#7fb3ff; }
.black { background:#eeeeee; border-color:#999; }

/* サワー余白 */
.sour-area { margin-bottom:20px; }

/* ボタン */
button {
  margin:5px;
  padding:12px 18px;
  border-radius:10px;
  font-size:16px;
}

/* オリジナルボタンON */
#originalBtn.active {
  background:#4cafef;
  color:white;
}

/* モーダル */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

.modal-content {
  background:white;
  margin:10% auto;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:12px;
}

/* カート */
.cart-item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:10px 0;
}

.drink-name {
  flex:1;
  text-align:center;
}

.qty-area {
  display:flex;
  align-items:center;
  gap:5px;
}

.qty-btn {
  width:40px;
  height:40px;
}

.delete-btn {
  background:red;
  color:white;
}
</style>
</head>

<body>

<div class="top">
  <h3>卓</h3>
  <select id="table" onchange="onTableSelect()"></select>
  <div id="tableLabel"></div>
</div>

<div id="menuArea" class="hidden">

<button id="originalBtn" onclick="toggleOriginal()">オリジナルカクテル</button>

<!-- 通常 -->
<div id="normalArea">
<img src="cat.jpg">キャッツ
<img src="https://samuraitz.com/blog/wp-content/uploads/2020/11/1e404bbd75d5ced6ae450dccc52fa769.png">るい・びとん
<h3>リキュール①</h3>
<div id="l1Area" class="grid"></div>

<h3>リキュール②</h3>
<div id="l2Area" class="grid"></div>

<h3>サワー</h3>
<div class="grid sour-area">
<label><input type="radio" name="sour" value="あり"><div class="card">あり</div></label>
<label><input type="radio" name="sour" value="なし"><div class="card">なし</div></label>
</div>
</div>

<!-- オリジナル -->
<div id="originalArea" class="hidden">
<h3>オリジナルカクテル</h3>
<div id="originalList"></div>
</div>

<button onclick="addToCart()">追加</button>
<button onclick="openCart()">注文確認</button>

</div>

<!-- モーダル -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <h3>注文確認</h3>
    <div id="cartList"></div>
    <button id="sendBtn" onclick="sendOrder()">送信</button>
    <button onclick="closeCart()">閉じる</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx3Z88Rj0Qo4HUSKVA-Yc5LHhHiMTYHO54Q-9n6NbXqGAdOYx9HOAHGaIKriWfBd8vN/exec";

let cart=[];
let isOriginal=false;

/* 初期 */
fetch(API_URL)
.then(r=>r.json())
.then(data=>{
  table.innerHTML='<option value="">選択</option>';
  data.table.forEach(t=>{
    table.innerHTML+=`<option>${t[0]}</option>`;
  });

  render("l1Area","l1",data.liqueur);
  render("l2Area","l2",data.liqueur);
  renderOriginal(data.original);
});

/* 卓 */
function onTableSelect(){
  const t=table.value;
  tableLabel.innerText=t?`選択中：${t}`:"";
  menuArea.classList.toggle("hidden",!t);
}

/* 色 */
function getColorClass(name){
  if(name==="紅") return "red";
  if(name==="翠") return "green";
  if(name==="累") return "white";
  if(name==="蒼") return "blue";
  if(name==="黎") return "black";
  return "";
}

/* リキュール */
function render(id,name,data){
  const el=document.getElementById(id);
  el.innerHTML="";

  data.forEach(item=>{
    const color=getColorClass(item[0]);

    el.innerHTML+=`
    <label>
      <input type="radio" name="${name}" value="${item[0]}">
      <div class="card ${color}">
        <div>${item[0]}</div>
        <div>${item[1]}</div>
      </div>
    </label>`;
  });
}

/* オリジナル */
function renderOriginal(data){
  originalList.innerHTML="";
  data.forEach(item=>{
    originalList.innerHTML+=`
    <label>
      <input type="radio" name="original" value="${item[0]}" onchange="selectOriginalEffect(this)">
      <div class="card">
        <div>${item[0]}</div>
        <div>${item[1]}</div>
      </div>
    </label>`;
  });
}

/* エフェクト */
function selectOriginalEffect(el){
  el.nextElementSibling.style.boxShadow="0 0 10px #4cafef";
}

/* 切替 */
function toggleOriginal(){
  isOriginal=!isOriginal;
  normalArea.classList.toggle("hidden",isOriginal);
  originalArea.classList.toggle("hidden",!isOriginal);
  originalBtn.classList.toggle("active",isOriginal);
}

/* 取得 */
function getSelected(n){
  const el=document.querySelector(`input[name="${n}"]:checked`);
  return el?el.value:null;
}

/* 追加 */
function addToCart(){
  let name="";

  if(isOriginal){
    const o=getSelected("original");
    if(!o) return alert("選んで！");
    name=o;
  }else{
    const l1=getSelected("l1");
    const l2=getSelected("l2");
    const s=getSelected("sour");

    if(!l1||!l2||!s) return alert("全部選んで！");

    const type = (s==="あり") ? "サワー" : "カクテル";
    name=`${l1}${l2}${type}`;
  }

  const ex=cart.find(i=>i.name===name);
  ex?ex.qty++:cart.push({name,qty:1});

  // リセット
  document.querySelectorAll("input").forEach(i=>i.checked=false);

  // 🔥ここ重要
  if(isOriginal){
    toggleOriginal();
  }
}

/* カート */
function openCart(){
  cartList.innerHTML="";

  cart.forEach((c,i)=>{
    cartList.innerHTML+=`
    <div class="cart-item">
      <button class="delete-btn" onclick="removeItem(${i})">削除</button>
      <span class="drink-name">${c.name}</span>
      <div class="qty-area">
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        ${c.qty}
        <button class="qty-btn" onclick="changeQty(${i},1)">＋</button>
      </div>
    </div>`;
  });

  cartModal.style.display="block";
}

function closeCart(){ cartModal.style.display="none"; }

function changeQty(i,d){
  cart[i].qty+=d;
  if(cart[i].qty<=0) cart.splice(i,1);
  openCart();
}

function removeItem(i){
  cart.splice(i,1);
  openCart();
}

/* 送信 */
function sendOrder(){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      table:table.value,
      items:cart
    })
  }).then(()=>{
    cart=[];
    closeCart();
  });
}
</script>

</body>
</html>
